name: Phase 0 baseline gate

# Gates the MMT-DPI Master Improvement Plan on the Phase 0 baselines:
#   1. the BUILD=asan (ASan/UBSan) profile must compile  — Phase 0 / Phase 2 gate
#   2. the golden-pcap classification fingerprint must be unchanged — phases 1-3,5,6
#   3. labelled-pcap precision/recall must hold or improve — Phase 7 (M9, #74)
#
# The classification and precision jobs are self-contained: they use the small
# pcap subset vendored under tools/phase0/ci/pcaps/, so they need no access to
# the mmt-test repo. See tools/phase0/README.md.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  asan-build:
    name: ASan/UBSan profile compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libxml2-dev libpcap-dev
      - name: Build with BUILD=asan
        run: |
          make -C sdk clean
          make -C sdk -j"$(nproc)" BUILD=asan MMT_BASE="${RUNNER_TEMP}/mmt-asan"
      - name: Confirm the sanitizer runtime is wired into the library
        run: |
          lib="sdk/lib/libmmt_tcpip.so.$(grep -m1 '^VERSION' rules/common.mk | sed 's/.*:= *//')"
          echo "Checking ${lib} for ASan instrumentation ..."
          nm -D "${lib}" | grep -q '__asan_init' \
            && echo "OK: library is ASan-instrumented" \
            || { echo "FAIL: no ASan symbols in ${lib}"; exit 1; }

  tsan-mt-harness:
    name: Multi-threaded TSan thread-safety harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libxml2-dev libpcap-dev python3
      - name: Run the multi-threaded harness under ThreadSanitizer
        run: bash tools/phase0/tests/run_mt_tsan_test.sh

  ext-attribution:
    name: External IP-range / port attribution loaders (M9, issue #26 / #74)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libxml2-dev libpcap-dev
      - name: Run the external attribution loader unit test under ASan/UBSan
        run: bash tools/phase0/tests/run_ext_attribution_test.sh

  port-confirm:
    name: Payload-confirmed port-only demotion predicate (M9, issue #75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libxml2-dev libpcap-dev
      - name: Run the payload-confirm predicate unit test under ASan/UBSan
        run: bash tools/phase0/tests/run_port_confirm_test.sh

  classification-gate:
    name: Golden classification fingerprint unchanged
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libxml2-dev libpcap-dev
      - name: Check classification against the Phase 0 baseline
        run: tools/phase0/ci/check_classification.sh
      - name: Upload freshly captured fingerprint on mismatch
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: phase0-classification-actual
          path: tools/phase0/ci/baseline/classification.actual.txt
          if-no-files-found: ignore

  precision-gate:
    name: Labelled-pcap precision/recall holds or improves (M9, issue #74)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libxml2-dev libpcap-dev
      - name: Check precision/recall against the committed baseline
        run: tools/phase0/ci/check_precision.sh
      - name: Upload freshly captured metrics on mismatch
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: phase0-precision-actual
          path: tools/phase0/ci/baseline/precision.actual.txt
          if-no-files-found: ignore
